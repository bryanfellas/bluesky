<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bluesky — Previsão do Tempo</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Sora:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="clock-widget" id="clockWidget">
  <span id="clockTime">--:--</span>
  <span id="clockCity"></span>
</div>

<div class="app">
  <div class="topbar">
    <div class="logo">blue<em>sky</em></div>
    <div class="topbar-actions">
      <button class="theme-btn" onclick="toggleTheme()" title="Alternar tema">
        <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2" x2="12" y2="5"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="2" y1="12" x2="5" y2="12"/>
          <line x1="19" y1="12" x2="22" y2="12"/>
          <line x1="4.22" y1="4.22" x2="6.34" y2="6.34"/>
          <line x1="17.66" y1="17.66" x2="19.78" y2="19.78"/>
          <line x1="4.22" y1="19.78" x2="6.34" y2="17.66"/>
          <line x1="17.66" y1="6.34" x2="19.78" y2="4.22"/>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
      <div class="unit-toggle">
        <button id="bC" class="on" onclick="setUnit('C')">°C</button>
        <button id="bF" onclick="setUnit('F')">°F</button>
      </div>
    </div>
  </div>

  <div class="search-row">
    <input type="text" id="inp" placeholder="Buscar uma cidade (ex: Rio de Janeiro)" onkeydown="if(event.key==='Enter') search()">
    <button class="geo-btn" onclick="getGeo()" title="Usar minha localização atual">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="3"/>
        <line x1="12" y1="2" x2="12" y2="6"/>
        <line x1="12" y1="18" x2="12" y2="22"/>
        <line x1="2" y1="12" x2="6" y2="12"/>
        <line x1="18" y1="12" x2="22" y2="12"/>
      </svg>
    </button>
    <button class="go-btn" onclick="search()">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round">
        <circle cx="11" cy="11" r="6"/>
        <line x1="16.5" y1="16.5" x2="22" y2="22"/>
      </svg>
    </button>
  </div>

  <div id="err" class="err"></div>
  <div id="root">
    <div class="empty">
      <div class="empty-icon">🌤️</div>
      <p>Permita o acesso à sua localização<br>ou busque uma cidade acima.</p>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
